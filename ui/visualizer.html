<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C2CAD-Bench - Visualizer</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/visualizer.css">
    
    <!-- Data Loader -->
    <script>
        (function() {
            const phases = ['p1', 'p2', 'p3', 'p4'];
            const ts = Date.now();
            
            async function loadScripts() {
                const load = (src) => new Promise((resolve, reject) => {
                    const tag = document.createElement('script');
                    tag.src = src;
                    tag.onload = resolve;
                    tag.onerror = () => reject(new Error(`Failed to load ${src}`));
                    document.head.appendChild(tag);
                });

                try {
                    await Promise.all(phases.map(p => load(`../results/showcase_db_${p}.js?v=${ts}`)));
                    console.log('Visualizer data loaded successfully.');
                    window.dispatchEvent(new Event('CG3D_DATA_READY'));
                } catch (e) {
                    console.error('Data loading error:', e);
                    const status = document.getElementById('empty-state');
                    if (status) {
                        status.innerHTML = `
                            <div style="color:#f43f5e; padding: 40px; border: 1px solid rgba(244,63,94,0.2); background: rgba(244,63,94,0.05); border-radius: 12px; text-align:center;">
                                <h3 style="margin-top:0">⚠ Connection Error</h3>
                                <p>Failed to load benchmark database files.</p>
                                <button onclick="location.reload()" class="hbtn" style="margin-top:16px; background:#1e293b; color:#fff;">Try Again</button>
                            </div>
                        `;
                    }
                }
            }
            window._loadData = loadScripts;
        })();
    </script>
</head>
<body class="dark-theme">
    <canvas id="main-canvas"></canvas>

    <nav>
        <div class="nav-container">
            <a href="../index.html" class="nav-brand">C2CAD-Bench</a>
            <div class="nav-links">
                <a href="../index.html">Abstract</a>
                <a href="../index.html#about">About</a>
                <a href="../index.html#benchmarks">Benchmarks</a>
                <a href="results.html">Scoreboard</a>
                <a href="visualizer.html" class="active">3D Visualizer</a>
            </div>
        </div>
    </nav>

    <div id="ui-controls">
        <div style="display:flex; align-items:center; gap:16px;">
            <h3>Model Selection:</h3>
            <select id="modelSelector"></select>
        </div>
        <div style="display:flex;gap:16px;align-items:center;">
            <button onclick="location.reload(true)" class="hbtn">↻ Reload</button>
            <div id="overallScore" class="overall-badge"></div>
        </div>
    </div>

    <div id="phase-bar">
        <button class="phase-tab active" data-phase="1">Phase 1 <span class="badge">18</span></button>
        <button class="phase-tab"        data-phase="2">Phase 2 <span class="badge">18</span></button>
        <button class="phase-tab"        data-phase="3">Phase 3 <span class="badge">18</span></button>
        <button class="phase-tab"        data-phase="4">Phase 4 <span class="badge">21</span></button>
    </div>

    <div id="content">
        <div id="empty-state">Preparing 3D environment...</div>
    </div>

    <footer>
        <div class="footer-container">
            <a href="../index.html" class="footer-logo">C2CAD-Bench</a>
            <div class="footer-links">
                <a href="../index.html">Abstract</a>
                <a href="../index.html#about">About</a>
                <a href="results.html">Scoreboard</a>
                <a href="visualizer.html">3D Viewer</a>
            </div>
            <p class="footer-copy">&copy; 2026 C2CAD-Bench Research Team. Released under the MIT License.</p>
        </div>
    </footer>

    <!-- Three.js r160 ES modules -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script src="../js/background.js"></script>
    <script type="module" src="../js/visualizer.js"></script>
</body>
</html>
