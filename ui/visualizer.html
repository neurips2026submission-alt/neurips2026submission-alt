<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C2CAD-Bench 3D Visualizer</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;600;700&family=Quicksand:wght@300;400;500;600;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    
    <!-- Frameworks -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.1/css/bulma.min.css">
    <script src="https://kit.fontawesome.com/5fd1dd8417.js" crossorigin="anonymous"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="../css/c2cad.css">
    <link rel="stylesheet" href="../css/visualizer.css">
    
    <!-- Data Loader -->
    <script>
        (function() {
            const phases = ['p1', 'p2', 'p3', 'p4'];
            const ts = Date.now();
            
            async function loadScripts() {
                const load = (src) => new Promise((resolve, reject) => {
                    const tag = document.createElement('script');
                    tag.src = src;
                    tag.onload = resolve;
                    tag.onerror = () => reject(new Error(`Failed to load ${src}`));
                    document.head.appendChild(tag);
                });

                try {
                    await Promise.all(phases.map(p => load(`../results/showcase_db_${p}.js?v=${ts}`)));
                    console.log('Visualizer data loaded successfully.');
                    window.dispatchEvent(new Event('CG3D_DATA_READY'));
                } catch (e) {
                    console.error('Data loading error:', e);
                    const status = document.getElementById('empty-state');
                    if (status) {
                        status.innerHTML = `
                            <div class="notification is-danger is-light has-text-centered">
                                <h3 class="title is-4">⚠ Connection Error</h3>
                                <p>Failed to load benchmark database files.</p>
                                <button onclick="location.reload()" class="button is-dark mt-4">Try Again</button>
                            </div>
                        `;
                    }
                }
            }
            window._loadData = loadScripts;
        })();
    </script>
</head>
<body class="dark-theme">
    <canvas id="main-canvas"></canvas>

    <nav class="navbar is-transparent" role="navigation" aria-label="main navigation" style="background: rgba(10, 10, 10, 0.8) !important; backdrop-filter: blur(8px);">
        <div class="container">
            <div class="navbar-brand">
                <a class="navbar-item" href="../index.html" style="font-family:'Josefin Sans'; font-weight:700; font-size:1.5rem; color:#fff;">
                    C2CAD-Bench
                </a>
            </div>
            <div class="navbar-menu">
                <div class="navbar-end">
                    <a class="navbar-item has-text-white" href="../index.html">Abstract</a>
                    <a class="navbar-item has-text-white" href="../index.html#benchmarks">Benchmarks</a>
                    <a class="navbar-item has-text-white" href="results.html">Scoreboard</a>
                    <a class="navbar-item has-text-white is-active" href="visualizer.html">3D Visualizer</a>
                </div>
            </div>
        </div>
    </nav>

    <div id="ui-controls" class="is-flex is-align-items-center is-justify-content-space-between p-4" style="background: rgba(20, 20, 20, 0.7); border-radius: 12px; margin: 20px; border: 1px solid rgba(255,255,255,0.1);">
        <div class="field is-horizontal is-marginless">
            <div class="field-label is-normal">
                <label class="label has-text-white" style="font-family:'Quicksand'; font-weight:600;">Model Selection:</label>
            </div>
            <div class="field-body">
                <div class="control">
                    <div class="select is-rounded is-small">
                        <select id="modelSelector"></select>
                    </div>
                </div>
            </div>
        </div>
        <div class="is-flex is-align-items-center" style="gap:16px;">
            <button onclick="location.reload(true)" class="button is-small is-rounded is-dark">↻ Reload</button>
            <div id="overallScore" class="overall-badge" style="font-family:'Josefin Sans';"></div>
        </div>
    </div>

    <div id="phase-bar" class="tabs is-toggle is-toggle-rounded is-centered mb-4">
        <ul>
            <li class="is-active" data-phase="1"><a>Phase 1</a></li>
            <li data-phase="2"><a>Phase 2</a></li>
            <li data-phase="3"><a>Phase 3</a></li>
            <li data-phase="4"><a>Phase 4</a></li>
        </ul>
    </div>

    <div id="content">
        <div id="empty-state" class="has-text-grey-light" style="font-family:'Quicksand';">Preparing 3D environment...</div>
    </div>

    <footer class="footer p-4" style="background: transparent;">
        <div class="container has-text-centered has-text-white-ter">
            <p>
                <strong>C2CAD-Bench</strong> by Anonymous Authors. 
                Released under the MIT License.
            </p>
        </div>
    </footer>

    <!-- Three.js r160 ES modules -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module" src="../js/visualizer.js"></script>
    <script>
        // Start loading data
        window._loadData();
        
        // Sync Bulma tabs with visualizer.js expectations
        document.querySelectorAll('#phase-bar li').forEach(tab => {
            tab.onclick = function() {
                document.querySelectorAll('#phase-bar li').forEach(t => t.classList.remove('is-active'));
                this.classList.add('is-active');
            };
        });
    </script>
</body>
</html>
